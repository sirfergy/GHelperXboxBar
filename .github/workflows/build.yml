name: build-msix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    strategy:
      matrix:
        platform: [x64, ARM64]
        configuration: [Release]

    env:
      Solution_Name: GHelperXboxBar.sln
      Package_Project: GHelperXboxBar.Package\GHelperXboxBar.Package.wapproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Diagnose Windows SDK / UAP platforms available
        shell: pwsh
        run: |
          Write-Host "=== Installed UAP platforms ==="
          $uapRoot = 'C:\Program Files (x86)\Windows Kits\10\Platforms\UAP'
          if (Test-Path $uapRoot) { Get-ChildItem $uapRoot | Select-Object Name } else { Write-Host "NO UAP folder at $uapRoot" }
          Write-Host "=== UnionMetadata ==="
          $um = 'C:\Program Files (x86)\Windows Kits\10\UnionMetadata'
          if (Test-Path $um) { Get-ChildItem $um | Select-Object Name } else { Write-Host "NO UnionMetadata" }
          Write-Host "=== References ==="
          $r = 'C:\Program Files (x86)\Windows Kits\10\References'
          if (Test-Path $r) { Get-ChildItem $r | Select-Object Name -First 30 } else { Write-Host "NO References" }
          Write-Host "=== .NET SDKs ==="
          dotnet --list-sdks

      - name: Generate placeholder visual assets
        shell: pwsh
        run: ./build/Generate-PlaceholderAssets.ps1

      - name: Create self-signed signing cert
        id: cert
        shell: pwsh
        run: |
          $pwd = ConvertTo-SecureString -String "ci-ephemeral" -Force -AsPlainText
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject "CN=GHelperXboxBar" `
            -KeyUsage DigitalSignature `
            -FriendlyName "GHelperXboxBar CI" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3","2.5.29.19={text}")
          $pfxPath = Join-Path $env:GITHUB_WORKSPACE "GHelperXboxBar.Package\GHelperXboxBar.Package_TemporaryKey.pfx"
          Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $pwd | Out-Null
          "pfxPath=$pfxPath"       | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "pfxPassword=ci-ephemeral" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "PFX written to $pfxPath"

      - name: Restore NuGet packages
        run: nuget restore $env:Solution_Name

      - name: Restore MSBuild packages (UWP / wapproj)
        run: >
          msbuild $env:Solution_Name
          /t:Restore
          /p:Configuration=${{ matrix.configuration }}
          /p:Platform=${{ matrix.platform }}
          /p:RestorePackagesConfig=true

      - name: Build MSIX
        run: >
          msbuild $env:Package_Project
          /t:Build
          /p:Configuration=${{ matrix.configuration }}
          /p:Platform=${{ matrix.platform }}
          /p:AppxBundle=Never
          /p:UapAppxPackageBuildMode=SideloadOnly
          /p:AppxPackageSigningEnabled=true
          /p:PackageCertificateKeyFile=${{ steps.cert.outputs.pfxPath }}
          /p:PackageCertificatePassword=${{ steps.cert.outputs.pfxPassword }}
          /p:AppxPackageDir=${{ github.workspace }}\AppPackages\\

      - name: List build outputs
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Path (Join-Path $env:GITHUB_WORKSPACE 'AppPackages') `
            -Include *.msix,*.msixbundle,*.cer,*.appxsym |
            Select-Object FullName, Length

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: GHelperXboxBar-${{ matrix.platform }}
          path: |
            AppPackages/**/*.msix
            AppPackages/**/*.msixbundle
            AppPackages/**/*.cer
            AppPackages/**/*.appinstaller
          if-no-files-found: error
          retention-days: 14
